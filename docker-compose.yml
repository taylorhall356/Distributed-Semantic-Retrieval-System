services:
  api:
    build:
      context: .
    container_name: semantic-retrieval-api
    depends_on:
      - postgres
      - qdrant
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: semantic_retrieval
      DB_USER: semantic_user
      DB_PASSWORD: semantic_password
      JWT_SECRET: development-secret-key-at-least-32-bytes
      DOCUMENTS_DIR: /app/storage/documents
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      QDRANT_COLLECTION: document_chunks
      EMBEDDING_MODEL_NAME: sentence-transformers/all-MiniLM-L6-v2
    ports:
      - "8080:8080"
    volumes:
      - documents_data:/app/storage/documents

  postgres:
    image: postgres:16
    container_name: semantic-retrieval-postgres
    environment:
      POSTGRES_DB: semantic_retrieval
      POSTGRES_USER: semantic_user
      POSTGRES_PASSWORD: semantic_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: semantic-retrieval-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  documents_data:
  postgres_data:
  qdrant_data:
